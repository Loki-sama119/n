<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: #333;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'VT323', monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #70c5ce;
        }

        /* --- UI LAYER --- */
        .ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10;
        }

        .score-live {
            position: absolute; top: 10%;
            font-size: 6rem; color: white;
            text-shadow: 4px 4px 0 #000;
            z-index: 10; font-weight: bold;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px; border-radius: 15px;
            border: 4px solid #fff; text-align: center;
            pointer-events: auto;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 {
            color: #f1c40f; font-size: 4rem; margin-bottom: 10px;
            text-shadow: 3px 3px 0 #e67e22; letter-spacing: 2px;
            line-height: 0.9;
        }

        .stats-box {
            background: #d35400; border: 2px solid #fff;
            padding: 15px; margin: 20px 0; border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .stat-label { color: #f1c40f; font-size: 1.5rem; text-transform: uppercase; }
        .stat-value { color: #fff; font-size: 2.5rem; text-shadow: 2px 2px 0 #000; }

        .btn-start {
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            border: none; border-bottom: 6px solid #1e8449;
            color: white; font-family: 'VT323', monospace;
            font-size: 2rem; padding: 15px 40px;
            border-radius: 8px; cursor: pointer;
            text-transform: uppercase; outline: none;
            transition: transform 0.1s; margin-top: 10px;
        }

        .btn-start:active { transform: translateY(4px); border-bottom-width: 2px; }
        .btn-start:hover { filter: brightness(1.1); }

        .hidden { display: none !important; }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Hiệu ứng chớp trắng khi thua */
        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 9999;
        }

        /* CRT Effect */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 999;
        }
    </style>
</head>
<body>

<div class="crt-overlay"></div>
<div id="flash"></div>
<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <div id="scoreDisplay" class="score-live hidden">0</div>

    <div id="startScreen" class="menu-card">
        <h1>FLAPPY<br>BIRD</h1>
        <p style="color: #ccc; font-size: 1.5rem; margin-bottom: 20px;">
            Nhấn SPACE hoặc CLICK để bay
        </p>
        <button class="btn-start" onclick="startGame()">CHƠI NGAY</button>
    </div>

    <div id="gameOverScreen" class="menu-card hidden">
        <h1 style="color: #e74c3c;">GAME OVER</h1>
        <div class="stats-box">
            <div class="stat-label">ĐIỂM SỐ</div>
            <div id="finalScore" class="stat-value">0</div>
            <div style="height: 10px;"></div>
            <div class="stat-label">KỶ LỤC</div>
            <div id="bestScore" class="stat-value">0</div>
        </div>
        <button class="btn-start" style="background: linear-gradient(to bottom, #e74c3c, #c0392b); border-bottom-color: #922b21;" onclick="resetGame()">
            CHƠI LẠI
        </button>
    </div>
</div>

<script>
    const cvs = document.getElementById("gameCanvas");
    const ctx = cvs.getContext("2d");
    const flashEl = document.getElementById("flash");

    // --- SOUND ENGINE (Web Audio API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        
        if (type === 'jump') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'score') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, now);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        }
    }

    function triggerFlash() {
        flashEl.style.transition = 'none';
        flashEl.style.opacity = 0.8;
        setTimeout(() => {
            flashEl.style.transition = 'opacity 0.5s ease-out';
            flashEl.style.opacity = 0;
        }, 50);
    }

    // --- GAME SETUP ---
    function resizeCanvas() {
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const birdImg = new Image(); birdImg.src = "bird.png";
    const bgImg = new Image(); bgImg.src = "bg.png";

    // Cấu hình ban đầu (DỄ CHƠI)
    const INITIAL_CONFIG = {
        gravity: 0.15,      // Rơi chậm
        jump: -3.5,         // Nhảy nhẹ
        gap: 200,           // Khe rộng
        pipeSpeed: 2.5,     // Tốc độ vừa phải
        pipeSpawnRate: 120  // Ống thưa
    };
    
    // Biến config động (sẽ tăng khó dần)
    let CONFIG = { ...INITIAL_CONFIG };

    let frames = 0;
    let score = 0;
    let bestScore = localStorage.getItem("fb_full_best") || 0;
    let isPlaying = false;
    let isGameOver = false;

    // --- UI ELEMENTS ---
    const scoreEl = document.getElementById("scoreDisplay");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const finalScoreEl = document.getElementById("finalScore");
    const bestScoreEl = document.getElementById("bestScore");

    function startGame() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isPlaying = true;
        isGameOver = false;
        startScreen.classList.add("hidden");
        scoreEl.classList.remove("hidden");
        loop();
    }

    function resetGame() {
        bird.y = cvs.height / 2;
        bird.velocity = 0;
        bird.rotation = 0;
        pipes.items = [];
        score = 0;
        frames = 0;
        scoreEl.innerText = 0;
        
        // Reset lại độ khó ban đầu
        CONFIG = { ...INITIAL_CONFIG };

        gameOverScreen.classList.add("hidden");
        startGame();
    }

    function endGame() {
        if(isGameOver) return;
        playSound('hit');
        triggerFlash();
        isPlaying = false;
        isGameOver = true;
        
        bestScore = Math.max(score, bestScore);
        localStorage.setItem("fb_full_best", bestScore);

        finalScoreEl.innerText = score;
        bestScoreEl.innerText = bestScore;
        scoreEl.classList.add("hidden");
        gameOverScreen.classList.remove("hidden");
    }

    // --- INPUT ---
    function flapAction() {
        if(isPlaying && !isGameOver) {
            bird.flap();
            playSound('jump');
        }
    }

    window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
            if (!isPlaying && !isGameOver && !startScreen.classList.contains("hidden")) startGame();
            else flapAction();
        }
    });
    window.addEventListener("touchstart", (e) => {
        if(e.target.tagName !== "BUTTON") flapAction();
    });
    window.addEventListener("mousedown", (e) => {
        if(e.target.tagName !== "BUTTON") flapAction();
    });

    // --- OBJECTS ---
    const background = {
        draw: function() {
            try { ctx.drawImage(bgImg, 0, 0, cvs.width, cvs.height); }
            catch(e) { ctx.fillStyle = "#70c5ce"; ctx.fillRect(0, 0, cvs.width, cvs.height); }
        }
    }

    const bird = {
        x: 60,
        y: cvs.height / 2,
        velocity: 0,
        radius: 14,
        rotation: 0,

        flap: function() {
            this.velocity = CONFIG.jump;
            this.rotation = -25 * Math.PI / 180; // Ngóc đầu lên 25 độ
        },

        update: function() {
            this.velocity += CONFIG.gravity;
            this.y += this.velocity;

            // Xử lý xoay đầu (Animation)
            if (this.velocity > this.radius * 0.8) {
                this.rotation += 0.04; // Cắm đầu xuống từ từ
                if (this.rotation > 90 * Math.PI / 180) this.rotation = 90 * Math.PI / 180;
            } else {
                // Giữ góc ngóc lên một chút nếu chưa rơi nhanh
                if (this.rotation < -15 * Math.PI / 180) {
                   this.rotation = -15 * Math.PI / 180;
                }
            }

            if (this.y + this.radius >= cvs.height - 20) endGame();
            if (this.y - this.radius <= 0) {
                this.y = this.radius;
                this.velocity = 0;
            }
        },

        draw: function() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            try {
                ctx.drawImage(birdImg, -17, -12, 34, 24);
            } catch(e) {
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI*2);
                ctx.fillStyle = "yellow";
                ctx.fill();
            }
            ctx.restore();
        }
    }

    const pipes = {
        items: [],
        w: 65,

        update: function() {
            if (frames % CONFIG.pipeSpawnRate == 0) {
                let maxPos = cvs.height - CONFIG.gap - 50; 
                let minPos = 50;
                let topHeight = Math.floor(Math.random() * (maxPos - minPos + 1) + minPos);
                this.items.push({ x: cvs.width, topH: topHeight, passed: false });
            }

            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                p.x -= CONFIG.pipeSpeed;

                // Xóa ống
                if (p.x + this.w < 0) {
                    this.items.shift();
                    i--;
                    continue;
                }

                // Ghi điểm
                if (p.x + this.w < bird.x && !p.passed) {
                    score++;
                    p.passed = true;
                    scoreEl.innerText = score;
                    playSound('score');

                    // --- LEVEL UP: Tăng độ khó mỗi 5 điểm ---
                    if (score % 5 === 0) {
                        CONFIG.pipeSpeed = Math.min(CONFIG.pipeSpeed + 0.3, 6); // Max speed = 6
                    }
                }

                // Va chạm
                let birdLeft = bird.x - bird.radius + 5;
                let birdRight = bird.x + bird.radius - 5;
                let birdTop = bird.y - bird.radius + 5;
                let birdBottom = bird.y + bird.radius - 5;

                let pipeLeft = p.x;
                let pipeRight = p.x + this.w;
                let topPipeBottom = p.topH;
                let bottomPipeTop = p.topH + CONFIG.gap;

                if (birdRight > pipeLeft && birdLeft < pipeRight) {
                    if (birdTop < topPipeBottom || birdBottom > bottomPipeTop) {
                        endGame();
                    }
                }
            }
        },

        draw: function() {
            ctx.fillStyle = "#2ecc71";
            ctx.strokeStyle = "#27ae60";
            ctx.lineWidth = 3;

            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                // Ống trên
                ctx.fillRect(p.x, 0, this.w, p.topH);
                ctx.strokeRect(p.x, 0, this.w, p.topH);
                ctx.fillRect(p.x - 4, p.topH - 24, this.w + 8, 24);
                ctx.strokeRect(p.x - 4, p.topH - 24, this.w + 8, 24);

                // Ống dưới
                let bottomY = p.topH + CONFIG.gap;
                let bottomH = cvs.height - bottomY;
                ctx.fillRect(p.x, bottomY, this.w, bottomH);
                ctx.strokeRect(p.x, bottomY, this.w, bottomH);
                ctx.fillRect(p.x - 4, bottomY, this.w + 8, 24);
                ctx.strokeRect(p.x - 4, bottomY, this.w + 8, 24);
            }
        }
    }

    // --- LOOP ---
    function loop() {
        background.draw();

        // Đất
        ctx.fillStyle = "#e67e22";
        ctx.fillRect(0, cvs.height - 20, cvs.width, 20);
        ctx.fillStyle = "#27ae60";
        ctx.fillRect(0, cvs.height - 25, cvs.width, 5);

        if (isPlaying && !isGameOver) {
            pipes.update();
            pipes.draw();
            bird.update();
            bird.draw();
            frames++;
            requestAnimationFrame(loop);
        } else if (isGameOver) {
            pipes.draw();
            bird.draw();
        }
    }

    // Init
    bgImg.onload = function() { background.draw(); }
    setTimeout(() => background.draw(), 100);

</script>
</body>
</html>
